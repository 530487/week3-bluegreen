apiVersion: apps/v1
kind: Deployment
metadata:
  name: blue-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
      version: blue
  template:
    metadata:
      labels:
        app: myapp
        version: blue
    spec:
      containers:
      - name: blue-container
        image: europe-west1-docker.pkg.dev/cloud-engineering-487015/week3-repo/blue:latest
        ports:
        - containerPort: 80
