apiVersion: apps/v1
kind: Deployment
metadata:
  name: green-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
      version: green
  template:
    metadata:
      labels:
        app: myapp
        version: green
    spec:
      containers:
      - name: green-container
        image: europe-west1-docker.pkg.dev/cloud-engineering-487015/week3-repo/green:latest
        ports:
        - containerPort: 80
